server:
  http_listen_port: 3200

memberlist:
  abort_if_cluster_join_fails: false
  bind_port: 7946
  join_members:
    - 0.0.0.0:7946

compactor:
  compaction:
    compaction_window: 1h
    block_retention: 48h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

distributor:
  log_received_spans:
        enabled: true
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  lifecycler:
    ring:
      kvstore:
        store: memberlist
      replication_factor: 1
    final_sleep: 0s
  trace_idle_period: 10s
  max_block_duration: 5m
